name: CI/CD

# Pipeline: lint -> typecheck -> test -> build -> deploy
# Runs quality checks on every push/PR and deploys (publishes a production
# container image to GitHub Container Registry) when changes land on `main`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege defaults; the deploy job widens its own permissions.
permissions:
  contents: read

jobs:
  ci:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Cache node_modules so the install step is skipped (or near-instant)
      # when package-lock.json is unchanged.
      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      # The Prisma client is generated (not committed, see .gitignore) and is
      # required for type-checking/linting. `prisma generate` only reads the
      # schema and does not connect to the database; the datasource URL is
      # resolved from DATABASE_URL, so a placeholder is sufficient here.
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/kraken

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    needs: ci
    # Only deploy on pushes to the default branch (not on PRs).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GitHub Container Registry
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # Hash package-lock.json so the Docker layer cache is scoped (and thus
      # reused) only when dependencies are unchanged.
      - name: Compute lockfile hash
        id: lockhash
        run: echo "hash=${{ hashFiles('**/package-lock.json') }}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=prod-${{ steps.lockhash.outputs.hash }}
          cache-to: type=gha,mode=max,scope=prod-${{ steps.lockhash.outputs.hash }}
